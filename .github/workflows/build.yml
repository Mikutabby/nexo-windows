name: Build Nexo 3.0 for Windows

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔧 Build executable with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=assets/nexo_icono.ico --name "Nexo 3.0" --add-data "actions;actions" --add-data "assets;assets" --add-data "config;config" --add-data "core;core" --add-data "launchers;launchers" --add-data "memory;memory" --add-data "requirements.txt;." main.py

      - name: 📦 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexo-3.0-Windows-x64
          path: dist/"Nexo 3.0".exe
          if-no-files-found: error
          compression-level: 0

      - name: 📏 Check file size
        run: |
          ls -lh dist/
